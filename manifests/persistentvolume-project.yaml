apiVersion: "v1"
kind: "PersistentVolume"
metadata:
  name: "shared-data-project"
spec:
  storageClassName: "local-storage-project"
  capacity:
    storage: "1Gi"
  volumeMode: "Filesystem"
  accessModes:
    - "ReadWriteOnce"
  local:
    path: /tmp/kube/project
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: "kubernetes.io/hostname"
              operator: "In"
              values:
                - "k3d-k3s-default-agent-0"
