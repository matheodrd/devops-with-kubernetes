apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "ping-pong"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "ping-pong"
  template:
    metadata:
      labels:
        app: "ping-pong"
    spec:
      containers:
        - name: "ping-pong"
          image: "registry:5111/ping-pong"
          env:
            - name: "PORT"
              value: "8095"
